version: "3.9"
services:
  redis-glass:
    build: .
    ports:
      - "6379:6379"
      - "8080:8080"
    environment:
      - REDIS_PASSWORD=changeme
      - AOF_PATH=/data/appendonly.aof
      - AOF_FSYNC=everysec
      - AOF_REWRITE_SIZE_MB=64
      - DASHBOARD_PORT=8080
      - DASHBOARD_PASSWORD=changeme
      - TLS_CERT_FILE=
      - TLS_KEY_FILE=
      - MAXMEMORY_MB=
      - SLOWLOG_THRESHOLD_MS=10
      - SENSITIVE_KEYS=
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
